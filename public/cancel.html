      border-radius: 20px;

    }
    @keyframes pulse {

      font-weight: bold;
      margin-bottom: 20px;

      background: linear-gradient(135deg, #ff6b6b, #ff4c4c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      font-size: 1.3rem;
      margin-bottom: 40px;
      line-height: 1.6;
      opacity: 0.9;
      color: hsl(210, 40%, 85%);
    }
    .buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: hsl(207, 89%, 50%);
      color: white;
      padding: 16px 32px;
      text-decoration: none;
      font-weight: 600;
      border-radius: 12px;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,123,255,0.3);
      border: 1px solid hsl(207, 89%, 60%);
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,123,255,0.4);
      background: hsl(207, 89%, 55%);
    }
    .whatsapp-help {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
      transition: all 0.3s ease;
      text-decoration: none;
      z-index: 1000;
    }
    .whatsapp-help:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 25px rgba(37, 211, 102, 0.6);
    }
    .whatsapp-help svg {
      width: 32px;
      height: 32px;
      fill: white;
    }
    .tooltip {
      position: absolute;
      right: 70px;
      top: 50%;
      transform: translateY(-50%);
      background: #333;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .tooltip::after {
      content: '';
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      border: 6px solid transparent;
      border-left-color: #333;
    }
    .whatsapp-help:hover .tooltip {
      opacity: 1;
      visibility: visible;
    }
    @media (max-width: 768px) {
      .container {
        padding: 40px 20px;
        margin: 20px;
      }
      .icon {
        font-size: 80px;
      }
      h1 {
        font-size: 2.2rem;
      }
      p {
        font-size: 1.1rem;
      }
      .buttons {
        flex-direction: column;
        align-items: center;
      }
      .btn {
        width: 100%;
        max-width: 280px;
      }
      .whatsapp-help {
        bottom: 20px;
        right: 20px;
        width: 50px;
        height: 50px;
      }
      .whatsapp-help svg {
        width: 28px;
        height: 28px;
      }
    }
  </style>
